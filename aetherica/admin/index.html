<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherica admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify@4/dist/tagify.css">
  <link rel="stylesheet" href="/aetherica/admin/css/admin.css">
</head>
<body class="adm-body adm-body--upload">

  <header class="adm-topbar">
    <div class="adm-topbar__brand">Aetherica · admin</div>
    <nav class="adm-topbar__nav">
      <a href="/aetherica/admin/" class="adm-topbar__tab" data-tab="upload">Upload</a>
      <a href="/aetherica/admin/manage" class="adm-topbar__tab" data-tab="manage">Manage</a>
    </nav>
    <button type="button" class="adm-topbar__logout" id="adm-logout">Sign out</button>
  </header>

  <main class="adm-page">
    <div class="adm-page__header">
      <h1 class="adm-page__title" id="adm-page-title">Add image</h1>
      <a href="/aetherica/admin/manage" class="adm-page__cancel" id="adm-edit-cancel" hidden>Cancel</a>
    </div>

    <form class="adm-upload" id="adm-upload-form" data-mode="create">

        <div class="adm-drop" id="adm-drop" tabindex="0">
          <input type="file" id="adm-file" accept="image/*,.jfif" hidden>
          <div class="adm-drop__empty" id="adm-drop-empty">
            <div class="adm-drop__hint">Drop an image here, or click to pick.</div>
            <div class="adm-drop__sub">JPG / JFIF / PNG / WebP / GIF (static), max 10 MB.</div>
          </div>
          <div class="adm-drop__preview" id="adm-drop-preview" hidden>
            <img id="adm-preview-img" alt="">
            <button type="button" class="adm-drop__clear" id="adm-drop-clear" aria-label="Clear selection">×</button>
            <div class="adm-drop__meta" id="adm-drop-meta"></div>
          </div>
        </div>
      <div style="display: flex; flex-direction: column; gap: 20px;">
        <div class="adm-fields">

          <label class="adm-field">
            <span class="adm-field__label">Title (optional)</span>
            <input type="text" id="adm-title" class="adm-field__input" maxlength="200">
          </label>

          <label class="adm-field">
            <span class="adm-field__label">Source URL (optional)</span>
            <input type="url" id="adm-source" class="adm-field__input" placeholder="https://…">
          </label>

          <label class="adm-field">
            <span class="adm-field__label">Tags</span>
            <input type="text" id="adm-tags" class="adm-field__input" placeholder="blonde, erotic, minimal, cyberpunk">
            <span class="adm-field__hint">Comma-separated.</span>
          </label>

          <div class="adm-field">
            <span class="adm-field__label">Curator rating</span>
            <div class="adm-rating" id="adm-rating" role="radiogroup" aria-label="Curator rating">
              <button type="button" class="adm-rating__pill" data-val="0">0</button>
              <button type="button" class="adm-rating__pill" data-val="1">1</button>
              <button type="button" class="adm-rating__pill" data-val="2">2</button>
              <button type="button" class="adm-rating__pill" data-val="3">3</button>
              <button type="button" class="adm-rating__pill" data-val="4">4</button>
              <button type="button" class="adm-rating__pill" data-val="5">5</button>
              <button type="button" class="adm-rating__pill" data-val="6">6</button>
              <button type="button" class="adm-rating__pill" data-val="7">7</button>
              <button type="button" class="adm-rating__pill" data-val="8">8</button>
              <button type="button" class="adm-rating__pill" data-val="9">9</button>
              <button type="button" class="adm-rating__pill" data-val="10">10</button>
            </div>
          </div>

          <div class="adm-toggles">
            <label class="adm-toggle">
              <input type="checkbox" id="adm-nsfw" checked>
              <span class="adm-toggle__label">NSFW</span>
            </label>
            <label class="adm-toggle">
              <input type="checkbox" id="adm-featured">
              <span class="adm-toggle__label">Featured</span>
            </label>
          </div>

        </div>

        <div class="adm-upload__status" id="adm-upload-status" hidden></div>

        <button type="submit" class="adm-upload__submit" id="adm-upload-submit" disabled>
          Add Image
        </button>
      </div>

      

    </form>

  </main>

  <div class="adm-overlay" id="adm-overlay" hidden role="status" aria-live="polite">
    <div class="adm-overlay__inner">
      <div class="adm-overlay__spinner" aria-hidden="true"></div>
      <div class="adm-overlay__label" id="adm-overlay-label">Uploading…</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify@4/dist/tagify.min.js"></script>
  <script src="/aetherica/admin/js/admin.js"></script>
</body>
</html>
