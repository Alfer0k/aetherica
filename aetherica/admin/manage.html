<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherica admin — manage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/aetherica/admin/css/admin.css">
</head>
<body class="adm-body adm-body--manage">

  <header class="adm-topbar">
    <div class="adm-topbar__brand">Aetherica · admin</div>
    <nav class="adm-topbar__nav">
      <a href="/aetherica/admin/" class="adm-topbar__tab" data-tab="upload">Upload</a>
      <a href="/aetherica/admin/manage" class="adm-topbar__tab" data-tab="manage">Manage</a>
    </nav>
    <button type="button" class="adm-topbar__logout" id="adm-logout">Sign out</button>
  </header>

  <main class="adm-page">
    <div class="adm-page__header">
      <h1 class="adm-page__title">Manage images</h1>
      <span class="adm-page__count" id="adm-list-count"></span>
      <label class="adm-page__sort">
        <span class="adm-page__sort-label">Sort</span>
        <select id="adm-sort">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="largest">Largest first</option>
          <option value="smallest">Smallest first</option>
          <option value="rating-high">Highest rated</option>
          <option value="rating-low">Lowest rated</option>
        </select>
      </label>
    </div>

    <div class="adm-list" id="adm-list" data-state="loading">
      <div class="adm-list__state adm-list__state--loading">Loading…</div>
      <div class="adm-list__state adm-list__state--empty">No images yet. <a href="/aetherica/admin/">Add one →</a></div>
      <div class="adm-list__state adm-list__state--error">Couldn't load. Refresh the page.</div>
    </div>
  </main>

  <script src="/aetherica/admin/js/manage.js"></script>
  <script src="/aetherica/admin/js/admin.js"></script>
</body>
</html>
