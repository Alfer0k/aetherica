<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherica</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/aetherica/css/aetherica.css">
</head>
<body class="aeth-body">

  <header class="aeth-topbar">
    <a href="/aetherica/" class="aeth-topbar__back" id="aeth-back" aria-label="Back to gallery">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      <span>Gallery</span>
    </a>
    <span class="aeth-topbar__brand">Aetherica</span>
  </header>

  <main class="aeth-detail" id="aeth-detail" data-state="loading">

    <div class="aeth-detail__state aeth-detail__state--loading">Loading…</div>
    <div class="aeth-detail__state aeth-detail__state--error">Couldn't load this image.</div>
    <div class="aeth-detail__state aeth-detail__state--notfound">Image not found. <a href="/aetherica/">Back to gallery</a></div>

    <div class="aeth-detail__content" id="aeth-detail-content" hidden>

      <a href="#" class="aeth-detail__nav aeth-detail__nav--prev" id="aeth-prev" aria-label="Previous image" hidden>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </a>

      <figure class="aeth-detail__figure">
        <a class="aeth-detail__image-link" id="aeth-image-link" href="#" target="_blank" rel="noopener" title="Open full size">
          <img id="aeth-image" alt="" draggable="false">
        </a>
        <figcaption class="aeth-detail__caption">
          <h1 class="aeth-detail__title" id="aeth-title"></h1>
          <div class="aeth-detail__meta" id="aeth-meta"></div>
          <div class="aeth-detail__tags" id="aeth-tags"></div>
          <div class="aeth-detail__source" id="aeth-source" hidden>
            <a id="aeth-source-link" href="#" target="_blank" rel="noopener">Source ↗</a>
          </div>
        </figcaption>
      </figure>

      <a href="#" class="aeth-detail__nav aeth-detail__nav--next" id="aeth-next" aria-label="Next image" hidden>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </a>

    </div>

  </main>

  <script src="/aetherica/js/detail.js"></script>
</body>
</html>
