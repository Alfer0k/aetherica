<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherica — Pleasure Manor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="css/aetherica.css">
</head>
<body class="aeth-body">

  <header class="aeth-topbar">
    <a href="../index.html" class="aeth-topbar__back" aria-label="Back to Pleasure Manor">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      <span>Pleasure Manor</span>
    </a>
    <span class="aeth-topbar__brand">Aetherica</span>
    <button type="button" class="aeth-topbar__nsfw" id="aeth-nsfw-toggle" aria-label="Toggle NSFW visibility">NSFW</button>
  </header>

  <button type="button" class="aeth-filter-btn" id="aeth-filter-btn" aria-label="Open filter">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/></svg>
    <span class="aeth-filter-btn__count" id="aeth-filter-btn-count" hidden>0</span>
  </button>

  <main class="aeth-page">
    <section class="aeth-grid-wrap">
      <div class="aeth-filter" id="aeth-filter" hidden>
        <span class="aeth-filter__label">Filtering by</span>
        <div class="aeth-filter__chips" id="aeth-filter-chips"></div>
        <button type="button" class="aeth-filter__clear" id="aeth-filter-clear">Clear all</button>
      </div>
      <div id="aeth-grid" class="aeth-grid" data-state="loading">
        <div class="aeth-grid__state aeth-grid__state--loading">Loading…</div>
        <div class="aeth-grid__state aeth-grid__state--empty">Nothing matches.</div>
        <div class="aeth-grid__state aeth-grid__state--error">Couldn't load images. Try refreshing.</div>
      </div>
      <div class="aeth-loadmore" id="aeth-loadmore" hidden aria-hidden="true"></div>
    </section>
  </main>

  <div class="aeth-filter-backdrop" id="aeth-filter-backdrop" hidden></div>

  <aside class="aeth-filter-panel" id="aeth-filter-panel" aria-hidden="true" hidden>
    <header class="aeth-filter-panel__header">
      <span class="aeth-filter-panel__title">Filter</span>
      <button type="button" class="aeth-filter-panel__close" id="aeth-filter-panel-close" aria-label="Close filter">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </header>

    <div class="aeth-filter-panel__search">
      <input type="text" id="aeth-filter-search" placeholder="Search tags…" autocomplete="off">
    </div>

    <div class="aeth-filter-panel__hint">
      Click once to include, twice to exclude, third to clear.
    </div>

    <div class="aeth-filter-panel__list" id="aeth-filter-panel-list">
      <div class="aeth-filter-panel__loading">Loading tags…</div>
    </div>

    <div class="aeth-filter-panel__section">
      <span class="aeth-filter-panel__section-label">Minimum curator rating</span>
      <div class="aeth-filter-panel__rating" id="aeth-filter-rating" role="radiogroup" aria-label="Minimum curator rating">
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="0">Any</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="1">1+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="2">2+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="3">3+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="4">4+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="5">5+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="6">6+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="7">7+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="8">8+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="9">9+</button>
        <button type="button" class="aeth-filter-panel__rating-pill" data-val="10">10</button>
      </div>
    </div>

    <footer class="aeth-filter-panel__footer">
      <button type="button" class="aeth-filter-panel__clear" id="aeth-filter-panel-clear">Clear all</button>
      <button type="button" class="aeth-filter-panel__apply" id="aeth-filter-panel-apply">Apply</button>
    </footer>
  </aside>

  <script src="js/gallery.js"></script>
</body>
</html>
