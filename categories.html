<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — Pleasure Manor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="categories">

  <!-- Navigation -->
  <div id="nav"></div>

  <!-- Main Content -->
  <main class="main">
    <div class="container page-content">
      <div class="page-header">
        <div class="page-header__row">
          <div>
            <h1 class="page-header__title">Categories</h1>
            <p class="page-header__subtitle">Explore our curated collection</p>
          </div>
          <div class="section-toggle" id="section-toggle">
            <button class="section-toggle__btn section-toggle__btn--active" data-section="straight">Straight</button>
            <button class="section-toggle__btn" data-section="gay">Gay</button>
          </div>
        </div>
      </div>

      <div id="category-grid" class="category-grid">
        <!-- Rendered by JS -->
      </div>

      <div id="gay-video-grid" class="video-grid" style="display:none">
        <!-- Rendered by JS when Gay section is active -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Scripts -->
  <script src="js/categories-data.js"></script>
  <script src="js/videos-data.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
